name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Dry-run smoke test
        run: python3 ghost_ops.py --dry-run --once

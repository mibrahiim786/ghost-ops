[ghost_ops]
log_level = "INFO"
db_path = "ghost_ops.db"
elo_path = "~/.copilot/hackathon-elo.json"
agents_dir = "~/.copilot/agents"

[llm]
primary = "github-models"
fallback = "amplifier"
default_model = "claude-sonnet-4.6"

[missions.portfolio_watchdog]
enabled = true
schedule = "0 9,21 * * *"
repos = [
  "DUBSOpenHub/ghost-ops",
  "DUBSOpenHub/dark-factory",
  "DUBSOpenHub/havoc-hackathon",
  "DUBSOpenHub/agent-xray",
  "DUBSOpenHub/copilot-cli-mastery",
  "DUBSOpenHub/ai-agent-catalog",
  "DUBSOpenHub/ai-toil-tracker",
  "DUBSOpenHub/copilot-cli-quickstart",
  "DUBSOpenHub/My-AI-Readme",
  "DUBSOpenHub/copilot-cli-agent-marketplace",
  "DUBSOpenHub/shadow-score-spec",
  "DUBSOpenHub/soss-ai-command-center",
  "DUBSOpenHub/GitHub-Secure-security-activation-template",
]

[missions.inbox_autopilot]
enabled = true
schedule = "0 * * * *"
repos = [
  "DUBSOpenHub/ghost-ops",
  "DUBSOpenHub/dark-factory",
  "DUBSOpenHub/havoc-hackathon",
  "DUBSOpenHub/agent-xray",
  "DUBSOpenHub/copilot-cli-mastery",
  "DUBSOpenHub/ai-agent-catalog",
  "DUBSOpenHub/ai-toil-tracker",
  "DUBSOpenHub/copilot-cli-quickstart",
  "DUBSOpenHub/My-AI-Readme",
  "DUBSOpenHub/copilot-cli-agent-marketplace",
  "DUBSOpenHub/shadow-score-spec",
  "DUBSOpenHub/soss-ai-command-center",
  "DUBSOpenHub/GitHub-Secure-security-activation-template",
]
auto_label = true
auto_draft = true
auto_close_stale_days = 30

[missions.fleet_evolution]
enabled = true
schedule = "0 */3 * * *"
evolution_batch_size = 3
consensus_threshold = 2
validator_models = ["claude-opus-4.6", "gpt-5.2", "claude-sonnet-4.6"]

[alerts]
write_to_db = true
create_github_issue = false
